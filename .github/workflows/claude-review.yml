name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'
      - '.claude/agents/**'
      - '.claude/context/**'
      - '.github/workflows/claude-review.yml'

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing this pull request. The full reviewer rubric, severity tagging,
            scope rules, and output format are defined in `.claude/agents/python-code-reviewer.md`.
            Read that file first, then follow its instructions exactly.

            Additional context files that the rubric directs you to load on demand:
            - `.claude/context/google-python-style.md` — load when reviewing `.py` files
            - `.claude/context/ai-agent-security.md`  — load when reviewing files under
              `**/agents/**`, `**/tools/**`, `**/mcp/**`, `**/prompts/**`, or that import
              `anthropic`/`openai`/`langchain`
            - `.claude/context/pr-review-checklist.md` — your working checklist

            Posting findings:
            - Use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true`
              for each finding tied to a specific line.
            - Use `gh pr comment` ONCE at the end to post the top-level summary block
              defined in the rubric.
            - Do NOT submit review text as chat messages — only as GitHub comments.
            - Do NOT modify any files. Do NOT push commits. Review only.
          claude_args: |
            --allowedTools "Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(git diff:*),Bash(git log:*),mcp__github_inline_comment__create_inline_comment"
